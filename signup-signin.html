<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login & Sign Up</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="signup-signins.css">
</head>
<body>

    <!--Login Page -->
    <div class="card-container" id="loginPage">
        <div class="row g-0 h-100">
            <!--Left Box-->
            <div class="col-md-6 form-side d-flex flex-column justify-content-center align-items-center">
                <form>
                    <h2 class="mb-4 fw-bold">Sign In</h2>
                    
                    <div class="mb-3 w-100">
                        <label class="form-label text-white small">Email</label>
                        <input type="email" class="form-control" placeholder="Enter your email">
                    </div>
                    
                    <div class="mb-3 w-100">
                        <label class="form-label text-white small">Password</label>
                        <input type="password" class="form-control" placeholder="Enter your password">
                    </div>

                    <div class="w-100 text-start mb-4">
                        <a href="#" class="small text-dark text-decoration-none">Forgot Password?</a>
                    </div>

                    <button type="button" onclick="window.location.href='home.html'" class="btn btn-dark w-50 rounded-pill">Sign in</button>
                </form>
            </div>

            <!--Right Box-->
            <div class="col-md-6 banner-side d-flex flex-column justify-content-center align-items-center text-center">
                <img class="logo" src="LOGO.jpg">
                <h3 class="text-white">Don't have an account?</h3>
                <button onclick="togglePage()" class="btn btn-outline-light mt-3 rounded-pill px-4">Sign Up</button>
            </div>

        </div>
    </div>

    <!--Sign Up Page -->
    <div class="card-container d-none" id="signupPage">
        <div class="row g-0 h-100">
            
            <!--Left Box-->
            <div class="col-md-6 banner-side d-flex flex-column justify-content-center align-items-center text-center">
                <img class="logo" src="LOGO.jpg">
                <h3 class="text-white">Already have an account?</h3>
                <button onclick="togglePage()" class="btn btn-outline-light mt-3 rounded-pill px-4">Login</button>
            </div>

            <!--Right Box-->
            <div class="col-md-6 form-side d-flex flex-column justify-content-center align-items-center">
                <form>
                    <h2 class="mb-4 fw-bold">Create Account</h2>
                    
                    <div class="mb-2 w-100">
                        <label class="form-label text-white small">Name</label>
                        <input type="text" class="form-control" placeholder="Enter your username">
                    </div>

                    <div class="mb-2 w-100">
                        <label class="form-label text-white small">Email</label>
                        <input type="email" class="form-control" placeholder="Enter your email">
                    </div>
                    
                    <div class="mb-3 w-100">
                        <label class="form-label text-white small">Password</label>
                        <input type="password" class="form-control" placeholder="Enter your password">
                    </div>

                    <button type="button" onclick="window.location.href='home.html'" class="btn btn-dark w-50 rounded-pill mt-2">Sign up</button>
                </form>
            </div>

        </div>
    </div>

    
    <script>
        function togglePage() 
        {
            const loginPage = document.getElementById('loginPage');
            const signupPage = document.getElementById('signupPage');

            if (loginPage.classList.contains('d-none')) 
            {
                loginPage.classList.remove('d-none');
                signupPage.classList.add('d-none');
            } 
            else 
            {
                loginPage.classList.add('d-none');
                signupPage.classList.remove('d-none');
            }
        }
    </script>

</body>
</html>
